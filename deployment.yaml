apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nest-api
  template:
    metadata:
      labels:
        app: nest-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          envFrom:
            - secretRef:
                name: postgres-credentials
          command:
            - sh
            - -c
            - |
              until PGPASSWORD="$POSTGRES_PASSWORD" pg_isready -h postgres -p 5432 -U "$POSTGRES_USER"; do
                echo "waiting for postgres..."
                sleep 2
              done
      affinity:
        podAntiAffinity:
          # requiredDuringSchedulingIgnoredDuringExecution:
          #   - labelSelector:
          #       matchExpressions:
          #         - key: app
          #           operator: In
          #           values:
          #             - nest-api
          #     topologyKey: "kubernetes.io/hostname"
      containers:
        - name: nest-api
          image: strongkeep-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: MEMCACHED_SERVERS
              value: "memcached:11211"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: MALICIOUS_CACHE_TTL
              value: "3600"
            - name: NODE_ENV
              value: "production"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
